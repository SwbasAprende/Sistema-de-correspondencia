{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - CER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-card img {
            width: 150px;
            margin-bottom: 10px;
        }
        .btn-login {
            background-color: #1a3a5c;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            border-radius: 8px;
        }
        .btn-login:hover {
            background-color: #2d6a9f;
            color: white;
        }
        .form-control:focus {
            border-color: #2d6a9f;
            box-shadow: 0 0 0 0.2rem rgba(45,106,159,0.25);
        }
    </style>
</head>
<body>
<div class="login-card text-center">
    <img src="{% static 'radicacion/logo_cer.jpg' %}" alt="Logo CER">
    <h5 class="fw-bold mt-2" style="color:#1a3a5c;">Sistema de Gestión de Correspondencia</h5>
    <p class="text-muted small">Centro de Estudios Regionales - Magdalena Medio</p>
    <hr>

    {% if form.errors %}
        <div class="alert alert-danger">Usuario o contraseña incorrectos.</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="mb-3 text-start">
            <label class="form-label fw-semibold">Usuario</label>
            <input type="text" name="username" class="form-control" placeholder="Ingresa tu usuario" required autofocus>
        </div>
        <div class="mb-4 text-start">
            <label class="form-label fw-semibold">Contraseña</label>
            <input type="password" name="password" class="form-control" placeholder="Ingresa tu contraseña" required>
        </div>
        <button type="submit" class="btn btn-login w-100">Ingresar al sistema</button>
    </form>

    <p class="text-muted small mt-4">Información y Conocimiento que Construye</p>
</div>
</body>
</html>
